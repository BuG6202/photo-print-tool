<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>照片拼版打印工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f0ede8;
    --surface: #ffffff;
    --ink: #1a1714;
    --ink2: #5a5550;
    --accent: #d64c2b;
    --accent2: #2b7dd6;
    --border: #d8d3cc;
    --cell-border: #b0a89e;
    --radius: 4px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ===== STEP LAYOUT ===== */
  .app {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 36px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 16px;
  }

  header h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  header span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink2);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ===== STEP INDICATOR ===== */
  .steps {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
  }

  .step-btn {
    flex: 1;
    padding: 10px 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    cursor: pointer;
    color: var(--ink2);
    transition: all 0.15s;
    border-right: none;
    text-align: center;
  }
  .step-btn:last-child { border-right: 1.5px solid var(--border); border-radius: 0 var(--radius) var(--radius) 0; }
  .step-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .step-btn.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .step-btn.done {
    background: var(--bg);
    color: var(--ink);
    border-color: var(--ink);
  }

  /* ===== PANEL ===== */
  .panel { display: none; }
  .panel.active { display: block; }

  .section-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink2);
    margin-bottom: 16px;
  }

  /* ===== LAYOUT GRID ===== */
  .layout-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .layout-card {
    border: 1.5px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    position: relative;
  }
  .layout-card:hover { border-color: var(--ink); transform: translateY(-1px); box-shadow: var(--shadow); }
  .layout-card.selected { border-color: var(--accent); background: #fff8f6; }
  .layout-card.selected::after {
    content: '✓';
    position: absolute;
    top: 6px; right: 8px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 800;
  }

  .layout-name {
    font-size: 28px;
    font-weight: 800;
    display: block;
    margin-bottom: 4px;
    letter-spacing: -1px;
    line-height: 1;
  }
  .layout-formula {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--ink2);
    display: block;
    margin-bottom: 2px;
  }
  .layout-desc {
    font-size: 10px;
    color: var(--ink2);
    font-family: 'DM Mono', monospace;
  }

  .orient-row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
  }
  .orient-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 18px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--ink2);
    transition: all 0.15s;
  }
  .orient-btn:hover { border-color: var(--ink); color: var(--ink); }
  .orient-btn.active { border-color: var(--accent); background: #fff8f6; color: var(--accent); }
  .orient-icon { font-size: 18px; line-height: 1; }

  /* Custom grid input */
  .custom-grid {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .custom-grid label {
    font-size: 13px;
    color: var(--ink2);
  }

  .custom-grid input {
    width: 52px;
    padding: 6px 8px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    text-align: center;
    color: var(--ink);
    background: var(--bg);
    outline: none;
  }
  .custom-grid input:focus { border-color: var(--ink); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border: 1.5px solid var(--ink);
    border-radius: var(--radius);
    background: var(--ink);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }
  .btn:hover { background: #000; }
  .btn.secondary { background: transparent; color: var(--ink); }
  .btn.secondary:hover { background: var(--border); }
  .btn.danger { border-color: var(--accent); background: var(--accent); }
  .btn.danger:hover { background: #b83d22; border-color: #b83d22; }
  .btn.print-btn { border-color: var(--accent2); background: var(--accent2); }
  .btn.print-btn:hover { background: #1f66c0; }

  /* ===== EDITOR PANEL ===== */
  .editor-toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .fit-info {
    padding: 7px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink2);
    background: var(--surface);
    letter-spacing: 0.3px;
  }

  .gap-control {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--ink2);
    font-family: 'DM Mono', monospace;
  }
  .gap-control input[type=range] {
    width: 80px;
    accent-color: var(--ink);
  }

  /* ===== A4 CANVAS ===== */
  .a4-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .a4-page {
    background: white;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    position: relative;
    border: 1px solid #ddd;
  }

  .cells-grid {
    width: 100%;
    height: 100%;
    display: grid;
    padding: 8px;
    gap: 4px;
  }

  .photo-cell {
    border: 1.5px dashed var(--cell-border);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: #fafafa;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .photo-cell:hover { border-color: var(--accent); background: #fff8f6; }
  .photo-cell.drag-over { border-color: var(--accent2); background: #f0f7ff; border-style: solid; }

  .cell-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    pointer-events: none;
  }
  .cell-placeholder svg { opacity: 0.3; }
  .cell-placeholder span {
    font-size: 10px;
    color: var(--ink2);
    font-family: 'DM Mono', monospace;
    opacity: 0.5;
  }

  .cell-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .cell-img.contain {
    object-fit: contain;
  }
  .cell-img.cover {
    object-fit: cover;
  }

  .cell-del {
    position: absolute;
    top: 3px; right: 3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: none;
    font-size: 11px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    line-height: 1;
  }
  .photo-cell:hover .cell-del { display: flex; }

  .cell-num {
    position: absolute;
    bottom: 3px; left: 4px;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: rgba(0,0,0,0.3);
    pointer-events: none;
    user-select: none;
  }

  /* hidden file input */
  #fileInput { display: none; }

  /* Drop overlay */
  .drop-zone-hint {
    font-size: 12px;
    color: var(--ink2);
    text-align: center;
    margin-bottom: 12px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.3px;
  }

  /* ===== ACTION BAR ===== */
  .action-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
    margin-top: 8px;
  }

  @media (max-width: 600px) {
    .layout-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .layout-card { padding: 10px 6px 8px; }
    .layout-preview { width: 44px; height: 62px; }
    .action-bar { justify-content: stretch; }
    .action-bar .btn { flex: 1; justify-content: center; }
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    z-index: 9999;
    transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .progress-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(240,237,232,0.85);
    z-index: 9998;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .progress-overlay.show { display: flex; }
  .progress-overlay p { font-size: 14px; color: var(--ink2); font-family: 'DM Mono', monospace; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>照片拼版</h1>
    <span>Print Layout Tool</span>
  </header>

  <div class="steps">
    <button class="step-btn active" onclick="goStep(1)">① 选布局</button>
    <button class="step-btn" onclick="goStep(2)" id="step2btn">② 排图片</button>
  </div>

  <!-- STEP 1: Layout Selection -->
  <div class="panel active" id="panel-layout">
    <p class="section-title">选择打印布局</p>

    <div class="orient-row">
      <button class="orient-btn active" id="orientPortrait" onclick="setOrientation('portrait')">
        <span class="orient-icon">▯</span> A4 竖版
      </button>
      <button class="orient-btn" id="orientLandscape" onclick="setOrientation('landscape')">
        <span class="orient-icon">▭</span> A4 横版
      </button>
    </div>

    <p class="section-title" style="margin-top:20px">每页格数（列 × 行）</p>

    <div class="layout-grid" id="layoutGrid">
      <!-- JS generated -->
    </div>

    <div class="custom-grid" id="customCard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <label>自定义：</label>
      <input type="number" id="customCols" min="1" max="8" value="3" placeholder="列">
      <label>列 ×</label>
      <input type="number" id="customRows" min="1" max="10" value="4" placeholder="行">
      <label>行</label>
      <button class="btn" onclick="selectCustom()">确定</button>
    </div>

    <br>
    <div style="display:flex; justify-content:flex-end;">
      <button class="btn" onclick="goStep(2)">下一步 →</button>
    </div>
  </div>

  <!-- STEP 2: Editor -->
  <div class="panel" id="panel-editor">
    <div class="editor-toolbar">
      <div class="fit-info">📐 等比居中 · 留边填充</div>

      <div class="gap-control">
        <span>间距</span>
        <input type="range" id="gapRange" min="0" max="20" value="4" oninput="updateGap(this.value)">
        <span id="gapVal">4px</span>
      </div>

      <button class="btn secondary" onclick="clearAll()" style="margin-left:auto">清空</button>
      <button class="btn secondary" onclick="goStep(1)">← 重选布局</button>
    </div>

    <p class="drop-zone-hint">拖拽图片到格子 · 或点击格子上传 · 也可拖拽图片文件到页面任意位置批量填入</p>

    <div class="a4-wrapper" id="a4Wrapper">
      <div class="a4-page" id="a4Page">
        <div class="cells-grid" id="cellsGrid"></div>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn" onclick="exportPDF()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        导出 PDF
      </button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" multiple>
<div class="toast" id="toast"></div>
<div class="progress-overlay" id="progressOverlay">
  <div class="spinner"></div>
  <p id="progressMsg">正在生成PDF…</p>
</div>

<script>
// ===== CONFIG =====
// Defined as portrait (cols x rows). Landscape will auto-swap.
const LAYOUTS = [
  { cols: 1, rows: 2 },
  { cols: 2, rows: 2 },
  { cols: 2, rows: 3 },
  { cols: 2, rows: 4 },
  { cols: 3, rows: 4 },
  { cols: 4, rows: 4 },
  { cols: 4, rows: 6 },
];

const A4_SHORT = 210, A4_LONG = 297; // mm

let state = {
  cols: 3, rows: 4,
  fitMode: 'contain',
  gap: 4,
  orientation: 'portrait',
  images: [],
  activeCell: null,
};

function pageRatio() {
  return state.orientation === 'portrait' ? A4_LONG / A4_SHORT : A4_SHORT / A4_LONG;
}

function canvasDims() {
  return state.orientation === 'portrait'
    ? { w: 1654, h: 2339 }
    : { w: 2339, h: 1654 };
}

// ===== ORIENTATION =====
function setOrientation(o) {
  state.orientation = o;
  document.getElementById('orientPortrait').classList.toggle('active', o === 'portrait');
  document.getElementById('orientLandscape').classList.toggle('active', o === 'landscape');
  state.images = Array(state.cols * state.rows).fill(null);
  renderLayoutCards();
}

// ===== INIT =====
function init() {
  renderLayoutCards();
  // select last card (4×6) after cards are built
  const cards = document.querySelectorAll('.layout-card');
  selectLayout(LAYOUTS[LAYOUTS.length - 1], cards[cards.length - 1]);
  setupDragToPage();
}

function renderLayoutCards() {
  const isLandscape = state.orientation === 'landscape';
  const grid = document.getElementById('layoutGrid');

  // Remember currently selected total to re-select after re-render
  const prevTotal = state.cols * state.rows;

  grid.innerHTML = '';
  LAYOUTS.forEach((l) => {
    // Swap cols/rows for landscape
    const cols = isLandscape ? l.rows : l.cols;
    const rows = isLandscape ? l.cols : l.rows;
    const total = cols * rows;
    const card = document.createElement('div');
    card.className = 'layout-card';
    if (total === prevTotal && cols === state.cols) card.classList.add('selected');
    card.innerHTML = `
      <span class="layout-name">${total}</span>
      <span class="layout-formula">${cols} 列 × ${rows} 行</span>
    `;
    card.onclick = () => selectLayout({ cols, rows }, card);
    grid.appendChild(card);
  });
}

function selectLayout(l, card) {
  document.querySelectorAll('.layout-card').forEach(c => c.classList.remove('selected'));
  if (card) card.classList.add('selected');
  state.cols = l.cols;
  state.rows = l.rows;
  state.images = Array(l.cols * l.rows).fill(null);
}

function selectCustom() {
  const cols = parseInt(document.getElementById('customCols').value) || 3;
  const rows = parseInt(document.getElementById('customRows').value) || 4;
  const clamped = { cols: Math.min(8, Math.max(1, cols)), rows: Math.min(10, Math.max(1, rows)) };
  document.querySelectorAll('.layout-card').forEach(c => c.classList.remove('selected'));
  state.cols = clamped.cols;
  state.rows = clamped.rows;
  state.images = Array(clamped.cols * clamped.rows).fill(null);
  showToast(`已选：${clamped.cols}列 × ${clamped.rows}行，共${clamped.cols * clamped.rows}格`);
}

// ===== STEP NAVIGATION =====
function goStep(n) {
  document.querySelectorAll('.step-btn').forEach((b, i) => {
    b.classList.toggle('active', i + 1 === n);
    b.classList.toggle('done', i + 1 < n);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if (n === 1) document.getElementById('panel-layout').classList.add('active');
  if (n === 2) {
    document.getElementById('panel-editor').classList.add('active');
    buildGrid();
  }
}

// ===== BUILD GRID =====
function buildGrid() {
  const page = document.getElementById('a4Page');
  const wrapper = document.getElementById('a4Wrapper');
  
  // Scale page to fit viewport
  const maxW = Math.min(wrapper.clientWidth - 32, 600);
  // for landscape cap width more aggressively so it doesn't overflow
  const w = state.orientation === 'landscape' ? Math.min(wrapper.clientWidth - 32, 780) : maxW;
  const h = Math.round(w * pageRatio());
  page.style.width = w + 'px';
  page.style.height = h + 'px';

  const grid = document.getElementById('cellsGrid');
  grid.style.gridTemplateColumns = `repeat(${state.cols}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${state.rows}, 1fr)`;
  grid.style.gap = state.gap + 'px';
  grid.style.padding = '8px';

  // Ensure images array is right size
  const total = state.cols * state.rows;
  while (state.images.length < total) state.images.push(null);
  state.images = state.images.slice(0, total);

  grid.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const cell = document.createElement('div');
    cell.className = 'photo-cell';
    cell.dataset.idx = i;

    if (state.images[i]) {
      const img = document.createElement('img');
      img.className = 'cell-img ' + state.fitMode;
      img.src = state.images[i];
      cell.appendChild(img);

      const del = document.createElement('button');
      del.className = 'cell-del';
      del.innerHTML = '×';
      del.title = '移除';
      del.onclick = (e) => { e.stopPropagation(); removeImage(i); };
      cell.appendChild(del);
    } else {
      const ph = document.createElement('div');
      ph.className = 'cell-placeholder';
      ph.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>点击/拖入</span>`;
      cell.appendChild(ph);
    }

    const num = document.createElement('div');
    num.className = 'cell-num';
    num.textContent = i + 1;
    cell.appendChild(num);

    cell.onclick = () => openFilePicker(i);
    cell.addEventListener('dragover', onCellDragOver);
    cell.addEventListener('dragleave', onCellDragLeave);
    cell.addEventListener('drop', (e) => onCellDrop(e, i));
    grid.appendChild(cell);
  }
}

function removeImage(idx) {
  state.images[idx] = null;
  buildGrid();
}

function clearAll() {
  state.images = Array(state.cols * state.rows).fill(null);
  buildGrid();
  showToast('已清空所有图片');
}

// ===== FILE PICKER =====
let pendingCell = null;
function openFilePicker(idx) {
  pendingCell = idx;
  const fi = document.getElementById('fileInput');
  fi.removeAttribute('multiple');
  fi.value = '';
  fi.click();
}

document.getElementById('fileInput').addEventListener('change', function() {
  const files = Array.from(this.files);
  if (!files.length) return;
  if (pendingCell !== null) {
    loadImageFile(files[0], pendingCell);
    pendingCell = null;
  } else {
    // batch
    let idx = state.images.findIndex(v => v === null);
    files.forEach(f => {
      if (idx >= 0 && idx < state.images.length) {
        loadImageFile(f, idx);
        idx++;
      }
    });
  }
});

function loadImageFile(file, idx) {
  const reader = new FileReader();
  reader.onload = (e) => {
    state.images[idx] = e.target.result;
    buildGrid();
  };
  reader.readAsDataURL(file);
}

// ===== CELL DRAG & DROP =====
function onCellDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onCellDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onCellDrop(e, idx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const files = e.dataTransfer.files;
  if (files.length > 0 && files[0].type.startsWith('image/')) {
    loadImageFile(files[0], idx);
  }
}

// ===== PAGE-LEVEL DROP (batch) =====
function setupDragToPage() {
  document.addEventListener('dragover', e => {
    if (e.dataTransfer.types.includes('Files')) e.preventDefault();
  });
  document.addEventListener('drop', e => {
    // only if not on a cell
    if (e.target.closest('.photo-cell')) return;
    e.preventDefault();
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    if (!files.length) return;
    let idx = state.images.findIndex(v => v === null);
    if (idx < 0) { showToast('所有格子都已有图片'); return; }
    files.forEach(f => {
      if (idx >= 0 && idx < state.images.length) {
        loadImageFile(f, idx);
        idx++;
      }
    });
  });
}

// ===== GAP =====
function updateGap(val) {
  state.gap = parseInt(val);
  document.getElementById('gapVal').textContent = val + 'px';
  document.getElementById('cellsGrid').style.gap = val + 'px';
}

// ===== CORE: render layout to Canvas =====
// Returns a Promise<HTMLCanvasElement> at the given pixel dimensions
function renderToCanvas(widthPx, heightPx) {
  return new Promise((resolve, reject) => {
    const canvas = document.createElement('canvas');
    canvas.width = widthPx;
    canvas.height = heightPx;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, widthPx, heightPx);

    // Scale padding/gap relative to the short side (794px ≈ 210mm at 96dpi)
    const refSize = Math.min(widthPx, heightPx);
    const PAD = Math.round(8 * refSize / 794);
    const GAP = Math.round(state.gap * refSize / 794);

    const totalW = widthPx - PAD * 2;
    const totalH = heightPx - PAD * 2;
    const cellW = (totalW - GAP * (state.cols - 1)) / state.cols;
    const cellH = (totalH - GAP * (state.rows - 1)) / state.rows;

    const total = state.cols * state.rows;
    let loaded = 0;

    ctx.strokeStyle = '#cccccc';
    ctx.lineWidth = 0.5;
    for (let r = 0; r < state.rows; r++) {
      for (let c = 0; c < state.cols; c++) {
        const x = PAD + c * (cellW + GAP);
        const y = PAD + r * (cellH + GAP);
        ctx.strokeRect(x, y, cellW, cellH);
      }
    }

    const imagesToLoad = state.images.filter(Boolean).length;
    if (imagesToLoad === 0) { resolve(canvas); return; }

    for (let i = 0; i < total; i++) {
      if (!state.images[i]) continue;
      const r = Math.floor(i / state.cols);
      const c = i % state.cols;
      const x = PAD + c * (cellW + GAP);
      const y = PAD + r * (cellH + GAP);

      const img = new Image();
      img.onload = () => {
        const imgAspect = img.naturalWidth / img.naturalHeight;
        const cellAspect = cellW / cellH;
        let dw, dh, dx, dy;
        if (imgAspect > cellAspect) {
          dw = cellW; dh = cellW / imgAspect;
          dx = x; dy = y + (cellH - dh) / 2;
        } else {
          dh = cellH; dw = cellH * imgAspect;
          dx = x + (cellW - dw) / 2; dy = y;
        }
        ctx.drawImage(img, dx, dy, dw, dh);
        loaded++;
        if (loaded === imagesToLoad) resolve(canvas);
      };
      img.onerror = () => { loaded++; if (loaded === imagesToLoad) resolve(canvas); };
      img.src = state.images[i];
    }
  });
}

// ===== EXPORT PDF =====
async function exportPDF() {
  showProgress('正在生成 PDF…');
  try {
    const { w, h } = canvasDims();
    const canvas = await renderToCanvas(w, h);
    const imgData = canvas.toDataURL('image/jpeg', 0.95);

    const { jsPDF } = window.jspdf;
    const isLandscape = state.orientation === 'landscape';
    const pdf = new jsPDF({
      orientation: isLandscape ? 'landscape' : 'portrait',
      unit: 'mm',
      format: 'a4'
    });
    // jsPDF landscape: page is 297mm wide x 210mm tall
    const pw = isLandscape ? A4_LONG : A4_SHORT;
    const ph = isLandscape ? A4_SHORT : A4_LONG;
    pdf.addImage(imgData, 'JPEG', 0, 0, pw, ph);

    // Timestamped filename: photoprint_YYYYMMDD_HHMMSS
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
    const filename = `photoprint_${ts}.pdf`;

    const pdfBlob = pdf.output('blob');
    const blobUrl = URL.createObjectURL(pdfBlob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);

    showToast('PDF 已导出 ✓');
  } catch(e) {
    console.error(e);
    showToast('导出失败：' + e.message);
  } finally {
    hideProgress();
  }
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function showProgress(msg) {
  document.getElementById('progressMsg').textContent = msg;
  document.getElementById('progressOverlay').classList.add('show');
}
function hideProgress() {
  document.getElementById('progressOverlay').classList.remove('show');
}

// ===== RESIZE =====
window.addEventListener('resize', () => {
  if (document.getElementById('panel-editor').classList.contains('active')) buildGrid();
});

init();
</script>
